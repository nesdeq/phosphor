name: phosphor
description: A retro AI terminal emulator. The future, rendered in phosphor.
publish_to: 'none'
version: 0.1.6

environment:
  sdk: ^3.6.0
  flutter: '>=3.27.0'

dependencies:
  flutter:
    sdk: flutter

  # Terminal emulation
  xterm: ^4.0.0
  flutter_pty: ^0.4.1

  # State management
  flutter_riverpod: ^3.3.1

  # Routing
  go_router: ^14.8.1

  # Shader utilities
  flutter_shaders: ^0.1.3

  # Storage
  shared_preferences: ^2.3.4

  # Audio
  audioplayers: ^6.1.0

  # Networking
  http: ^1.2.2

  # Encryption (AES-256-GCM + HKDF for multiplayer E2E)
  cryptography: ^2.7.0

  # Window management
  window_manager: ^0.4.3

  # Utilities
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: false

  # All three are Nerd Font patched (full Powerline / Devicons / FontAwesome
  # / Material / Codicons glyph sets). The active font is selected at runtime
  # by the user in Settings; see TerminalFont in settings_provider.dart.
  fonts:
    - family: DepartureMono
      fonts:
        - asset: assets/fonts/DepartureMonoNerdFontMono-Regular.otf
    - family: IBM3270
      fonts:
        - asset: assets/fonts/3270NerdFontMono-Regular.ttf
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMonoNerdFontMono-Regular.ttf

  shaders:
    - shaders/crt.frag

  assets:
    - assets/sounds/
    - assets/sounds/keystrokes/
