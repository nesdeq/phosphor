name: Bug report
description: Something is broken or behaving wrong
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please fill out the sections below — incomplete reports are usually closed without action.
        For security issues see [SECURITY.md](https://github.com/nesdeq/phosphor/blob/main/SECURITY.md) — do not file them here.

  - type: input
    id: version
    attributes:
      label: PHOSPHOR version
      description: Visible in the toolbar; or check `pubspec.yaml`.
      placeholder: "v0.1.5"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS (Apple Silicon)
        - Linux (x86_64)
        - Linux (ARM64)
        - Other
    validations:
      required: true

  - type: input
    id: os-version
    attributes:
      label: OS version
      description: "`sw_vers` on macOS, `lsb_release -a` on Linux"
      placeholder: "macOS 15.4 / Ubuntu 24.04"
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open PHOSPHOR
        2. Press Cmd+K
        3. Type "..."
        4. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / stack traces
      description: Paste any relevant terminal output, crash logs, or error messages.
      render: shell

  - type: checkboxes
    id: prereqs
    attributes:
      label: Pre-flight
      options:
        - label: I have searched [existing issues](https://github.com/nesdeq/phosphor/issues) and this is not a duplicate.
          required: true
        - label: This is not a security vulnerability (those go to [SECURITY.md](https://github.com/nesdeq/phosphor/blob/main/SECURITY.md)).
          required: true
