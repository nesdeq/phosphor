name: Feature request
description: Suggest an idea or improvement
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Lead with the **problem you're trying to solve**, not the solution. We can find a better solution together if we agree on the problem.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the use case or pain point.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you address it? Optional — if you don't have a concrete idea, that's fine.

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you've thought about and why they didn't fit.

  - type: checkboxes
    id: prereqs
    attributes:
      label: Pre-flight
      options:
        - label: I have searched [existing issues and discussions](https://github.com/nesdeq/phosphor/issues?q=is%3Aissue) and this isn't already proposed.
          required: true
