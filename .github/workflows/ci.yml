name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pubcache-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: pubcache-${{ runner.os }}-
      - run: flutter --version
      - run: flutter pub get
      - name: dart format
        run: dart format --set-exit-if-changed --output none .
      - name: flutter analyze
        run: flutter analyze --fatal-infos --fatal-warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pubcache-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: pubcache-${{ runner.os }}-
      - run: flutter pub get
      - name: Run tests
        run: flutter test --coverage --reporter expanded
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage/lcov.info
          if-no-files-found: ignore

  # Build smoke tests gate PR merges — they don't add signal on push to main
  # because the same commit already passed them as a PR.
  build-macos:
    name: Build macOS (arm64)
    if: github.event_name != 'push'
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pubcache-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: pubcache-${{ runner.os }}-
      - run: flutter config --enable-macos-desktop
      - run: flutter pub get
      - run: flutter build macos --debug

  build-linux:
    name: Build Linux (x86_64)
    if: github.event_name != 'push'
    # ARM64 Linux is not built in CI: subosito/flutter-action@v2 cannot
    # provision the Flutter SDK on aarch64 because upstream Flutter only
    # publishes x86_64 Linux toolchains. Re-add when upstream lands ARM64.
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pubcache-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: pubcache-${{ runner.os }}-
      - name: Install GTK toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev
      - run: flutter config --enable-linux-desktop
      - run: flutter pub get
      - run: flutter build linux --debug
