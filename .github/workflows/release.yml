name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify & test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pubcache-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: pubcache-${{ runner.os }}-
      - name: Verify pubspec version matches tag
        run: |
          pubspec=$(grep -E '^version:' pubspec.yaml | sed 's/version:[[:space:]]*//;s/+.*//')
          tag="${GITHUB_REF_NAME#v}"
          if [ "$pubspec" != "$tag" ]; then
            echo "::error::pubspec version ($pubspec) does not match tag ($tag)"
            exit 1
          fi
      - run: flutter pub get
      - run: dart format --set-exit-if-changed --output none .
      - run: flutter analyze --fatal-infos --fatal-warnings
      - run: flutter test --reporter expanded

  build-macos:
    name: macOS (arm64)
    needs: [verify]
    runs-on: macos-latest
    timeout-minutes: 30
    env:
      ARTIFACT: phosphor-macos-arm64.zip
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pubcache-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: pubcache-${{ runner.os }}-

      - run: flutter config --enable-macos-desktop
      - run: flutter pub get
      - run: flutter build macos --release

      - name: Zip macOS app
        run: |
          cd build/macos/Build/Products/Release
          zip -ry "${ARTIFACT}" Phosphor.app

      - uses: actions/upload-artifact@v7
        with:
          name: macos-arm64
          path: build/macos/Build/Products/Release/${{ env.ARTIFACT }}

  build-linux:
    name: Linux (x86_64)
    needs: [verify]
    # ARM64 Linux release builds are blocked on upstream Flutter publishing
    # aarch64 SDKs. Re-add `ubuntu-24.04-arm` once subosito/flutter-action
    # can fetch a working SDK there.
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      ARTIFACT: phosphor-linux-x86_64.tar.gz
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pubcache-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: pubcache-${{ runner.os }}-

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev

      - run: flutter config --enable-linux-desktop
      - run: flutter pub get
      - run: flutter build linux --release

      - name: Archive Linux bundle
        run: |
          cp linux/install.sh build/linux/*/release/bundle/ || true
          cd build/linux/*/release/bundle
          tar czf "${ARTIFACT}" *

      - uses: actions/upload-artifact@v7
        with:
          name: linux-x86_64
          path: build/linux/*/release/bundle/${{ env.ARTIFACT }}

  release:
    name: Publish release
    needs: [build-macos, build-linux]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Compute SHA256 checksums
        id: sums
        run: |
          cd artifacts
          ls -la
          sha256sum phosphor-macos-arm64.zip \
                    phosphor-linux-x86_64.tar.gz \
                    > SHA256SUMS.txt
          {
            echo 'sums<<EOF'
            cat SHA256SUMS.txt
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - uses: softprops/action-gh-release@v3
        with:
          files: |
            artifacts/phosphor-macos-arm64.zip
            artifacts/phosphor-linux-x86_64.tar.gz
            artifacts/SHA256SUMS.txt
          generate_release_notes: true
          body: |
            ## Install

            ### macOS (Apple Silicon)

            Download `phosphor-macos-arm64.zip`.

            1. Unzip the archive
            2. Drag `Phosphor.app` to `/Applications`
            3. Remove the quarantine attribute (the binary is unsigned):
               ```bash
               xattr -dr com.apple.quarantine /Applications/Phosphor.app
               ```

            ### Linux (x86_64)

            ARM64 Linux is not yet shipped — upstream Flutter does not publish an aarch64 SDK. Track [flutter/flutter#129143](https://github.com/flutter/flutter/issues/129143) or build from source.

            ```bash
            tar xzf phosphor-linux-x86_64.tar.gz
            ./install.sh
            ```

            Installs to `~/.local/share/phosphor/`, adds `phosphor` to your PATH via `~/.local/bin/`, and creates a desktop entry.

            ### Verify your download

            ```text
            ${{ steps.sums.outputs.sums }}
            ```

            Compare against `SHA256SUMS.txt` in this release:

            ```bash
            sha256sum -c SHA256SUMS.txt
            ```

            ---
