name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    name: macOS (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-latest
            artifact: phosphor-macos-arm64.zip
          - arch: x86_64
            runner: macos-13
            artifact: phosphor-macos-x86_64.zip
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter config --enable-macos-desktop
      - run: flutter pub get
      - run: flutter build macos --release

      - name: Zip macOS app
        run: |
          cd build/macos/Build/Products/Release
          zip -ry "${{ matrix.artifact }}" Phosphor.app

      - uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: build/macos/Build/Products/Release/${{ matrix.artifact }}

  build-linux:
    name: Linux (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
            artifact: phosphor-linux-x86_64.tar.gz
          - arch: arm64
            runner: ubuntu-24.04-arm
            artifact: phosphor-linux-arm64.tar.gz
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev

      - run: flutter config --enable-linux-desktop
      - run: flutter pub get
      - run: flutter build linux --release

      - name: Archive Linux bundle
        run: |
          cp linux/install.sh build/linux/*/release/bundle/ || true
          cd build/linux/*/release/bundle
          tar czf "${{ matrix.artifact }}" *

      - uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.arch }}
          path: build/linux/*/release/bundle/${{ matrix.artifact }}

  release:
    name: Publish release
    needs: [build-macos, build-linux]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Compute SHA256 checksums
        id: sums
        run: |
          cd artifacts
          ls -la
          sha256sum phosphor-macos-arm64.zip phosphor-macos-x86_64.zip \
                    phosphor-linux-x86_64.tar.gz phosphor-linux-arm64.tar.gz \
                    > SHA256SUMS.txt
          {
            echo 'sums<<EOF'
            cat SHA256SUMS.txt
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/phosphor-macos-arm64.zip
            artifacts/phosphor-macos-x86_64.zip
            artifacts/phosphor-linux-x86_64.tar.gz
            artifacts/phosphor-linux-arm64.tar.gz
            artifacts/SHA256SUMS.txt
          generate_release_notes: true
          body: |
            ## Install

            ### macOS

            Apple Silicon → `phosphor-macos-arm64.zip`. Intel → `phosphor-macos-x86_64.zip`.

            1. Unzip the archive
            2. Drag `Phosphor.app` to `/Applications`
            3. Remove the quarantine attribute (the binary is unsigned):
               ```bash
               xattr -dr com.apple.quarantine /Applications/Phosphor.app
               ```

            ### Linux

            x86_64 → `phosphor-linux-x86_64.tar.gz`. ARM64 → `phosphor-linux-arm64.tar.gz`.

            ```bash
            tar xzf phosphor-linux-<arch>.tar.gz
            ./install.sh
            ```

            Installs to `~/.local/share/phosphor/`, adds `phosphor` to your PATH via `~/.local/bin/`, and creates a desktop entry.

            ### Verify your download

            ```text
            ${{ steps.sums.outputs.sums }}
            ```

            Compare against `SHA256SUMS.txt` in this release:

            ```bash
            sha256sum -c SHA256SUMS.txt
            ```

            ---
